site_name: 窥猫君的个人进化系统
site_description: 记录成功日记、工作日志与长期画像的个人知识站
site_url: http://127.0.0.1:8000
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
nav:
  - 首页: index.md
  - 日报: daily/index.md
  - 周报: weekly/index.md
  - 月报: monthly/index.md
  - 画像: profile/index.md
  - 主题: themes/index.md
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
extra_css:
  - assets/custom.css
extra:
  generator: false